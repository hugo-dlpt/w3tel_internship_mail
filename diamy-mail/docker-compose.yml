# docker-compose de développement (maquette Diamy Mail).
# Postgres + observabilité d'abord ; les daemons se lancent avec `cargo run -p ...`
# le temps que leurs Dockerfiles soient écrits.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: diamymail
      POSTGRES_USER: diamy
      POSTGRES_PASSWORD: devonly_change_me   # placeholder de dev — jamais un vrai secret
    # Port hôte 5433 (pas 5432) : un Postgres natif occupe déjà 127.0.0.1:5432 sur cette
    # machine (projet STAGE DELEPORTE existant) — on évite toute ambiguïté de port.
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  prometheus:
    image: prom/prometheus:latest
    volumes: ["./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    # Port hôte 9091 (pas 9090) : déjà pris par le stack "diamy-prometheus" du projet
    # STAGE DELEPORTE (API vocale), qui tourne en parallèle sur cette machine.
    ports: ["9091:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: devonly_change_me
    # Port hôte 3001 (pas 3000) : même raison que Prometheus ci-dessus ("diamy-grafana").
    ports: ["3001:3000"]
    depends_on: [prometheus]
    volumes:
      # Provisioning : datasource Prometheus + dashboard "Diamy Mail" chargés au démarrage,
      # aucune config manuelle dans l'UI (guide §7 étape 0 — observabilité dès le départ).
      # UN SEUL mount (pas un second à l'intérieur) : Docker ne peut pas créer de point de
      # montage dans un bind mount déjà en lecture seule.
      - "./deploy/grafana/provisioning:/etc/grafana/provisioning:ro"

  # --- Daemons (à activer quand leurs Dockerfiles existent) ---
  # diamy-maild:
  #   build: { context: ., dockerfile: services/diamy-maild/Dockerfile }
  #   environment:
  #     DIAMY_ENV: dev
  #     DATABASE_URL: postgres://diamy:devonly_change_me@postgres:5432/diamymail
  #   depends_on: [postgres]
  #   ports: ["9101:9101"]

volumes:
  pgdata:
